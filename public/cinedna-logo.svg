<svg width="480" height="140" viewBox="0 0 480 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CineDNA Logo</title>
  <desc>CineDNA logo with geometric film-DNA symbol in gold</desc>

  <style>
    .cine { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 38px; font-weight: 400; font-style: italic; fill: #e8dcc8; letter-spacing: 2px; }
    .dna-w { font-family: 'DM Mono', 'Courier New', monospace; font-size: 38px; font-weight: 400; fill: #c4962a; letter-spacing: 4px; }
    .tagline { font-family: 'DM Mono', 'Courier New', monospace; font-size: 10px; fill: #444; letter-spacing: 5px; }
  </style>

  <!-- SYMBOL -->
  <rect x="20" y="18" width="1.8" height="96" fill="#c4962a" opacity="0.9"/>
  <rect x="58" y="18" width="1.8" height="96" fill="#c4962a" opacity="0.9"/>
  <rect x="20" y="22"  width="40" height="1.4" fill="#e8c76a" opacity="0.9"/>
  <rect x="20" y="36"  width="40" height="1.4" fill="#c4962a" opacity="0.7"/>
  <rect x="20" y="50"  width="40" height="1.4" fill="#e8c76a" opacity="0.9"/>
  <rect x="20" y="64"  width="40" height="1.4" fill="#c4962a" opacity="0.7"/>
  <rect x="20" y="78"  width="40" height="1.4" fill="#e8c76a" opacity="0.9"/>
  <rect x="20" y="92"  width="40" height="1.4" fill="#c4962a" opacity="0.7"/>
  <rect x="20" y="106" width="40" height="1.4" fill="#e8c76a" opacity="0.9"/>
  <circle cx="24" cy="22"  r="2.5" fill="#080808"/>
  <circle cx="58" cy="22"  r="2.5" fill="#080808"/>
  <circle cx="24" cy="106" r="2.5" fill="#080808"/>
  <circle cx="58" cy="106" r="2.5" fill="#080808"/>
  <polygon points="40,55 48,66 40,77 32,66" fill="none" stroke="#e8c76a" stroke-width="1.2"/>
  <polygon points="40,59 44,66 40,73 36,66" fill="#c4962a" opacity="0.6"/>
  <rect x="14" y="12" width="52" height="108" fill="none" stroke="#2a2a2a" stroke-width="0.8" rx="2"/>

  <!-- WORDMARK -->
  <text x="88" y="80"  class="cine">Cine</text>
  <text x="172" y="80" class="dna-w">DNA</text>
  <rect x="88" y="88" width="195" height="0.5" fill="#2a2a2a"/>
  <text x="88" y="104" class="tagline">FILM · IDENTITY · DISCOVERY</text>
</svg>
